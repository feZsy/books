<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文双的个人空间 | Insight Hub</title>
    <style>
        :root {
            --sidebar-width: 280px;
            --accent: #F25A00;
            --sidebar-bg: #ffffff;
            --footer-bg: #f8f9fa;
            --content-bg: #f2f2f2;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
            font-family: -apple-system, "PingFang SC", "Helvetica Neue", sans-serif;
            background: var(--content-bg);
            color: #333;
        }

        /* --- 侧边栏 --- */
        #sidebar {
            width: var(--sidebar-width);
            height: 100%;
            background: var(--sidebar-bg);
            border-right: 1px solid #ddd;
            display: flex;
            flex-direction: column;
            transition: margin-left var(--transition);
            flex-shrink: 0;
            z-index: 30;
        }

        body.collapsed #sidebar {
            margin-left: calc(var(--sidebar-width) * -1);
        }

        #module-container {
            flex: 1;
            overflow-y: auto;
            padding: 10px 15px;
        }

        .module-label {
            font-size: 11px;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 20px 12px 10px;
            font-weight: bold;
        }

        .sidebar-footer {
            height: 50px;
            background: var(--footer-bg);
            border-top: 1px solid #eee;
            display: flex;
            align-items: center;
            padding: 0 15px;
            box-sizing: border-box;
            color: #666;
            font-size: 13px;
            font-weight: 600;
            white-space: nowrap;
        }

        /* --- 树形菜单 --- */
        .tree-category {
            padding: 10px 12px;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            border-radius: 6px;
            font-size: 14px;
        }

        .tree-category:hover {
            background: #f5f5f5;
        }

        .tree-category::before {
            content: '▸';
            margin-right: 8px;
            transition: 0.2s;
        }

        .tree-category.open::before {
            transform: rotate(90deg);
        }

        .tree-list {
            display: none;
            list-style: none;
            padding-left: 20px;
            margin: 0;
        }

        .tree-list.open {
            display: block;
        }

        .tree-item {
            padding: 8px 12px;
            font-size: 13px;
            color: #555;
            cursor: pointer;
            border-radius: 4px;
            transition: 0.2s;
        }

        .tree-item:hover {
            color: var(--accent);
            background: #fff5f0;
        }

        /* --- 主视口 --- */
        #main-viewport {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #fff;
            min-width: 0;
            position: relative;
        }

        /* --- Tooltip --- */
        [data-tooltip]::after {
            content: attr(data-tooltip);
            position: absolute;
            background: #333;
            color: #fff;
            font-size: 11px;
            padding: 5px 10px;
            border-radius: 4px;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: 0.2s;
            z-index: 110;
        }

        [data-tooltip]:hover::after {
            opacity: 1;
            transform: translateY(-5px);
        }

        /* 切换按钮 (左下角) */
        #toggle-btn {
            position: absolute;
            bottom: 9px;
            left: 10px;
            z-index: 100;
            width: 32px;
            height: 32px;
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        #toggle-btn svg {
            transition: transform var(--transition);
        }

        body.collapsed #toggle-btn svg {
            transform: rotate(180deg);
        }

        /* 详情面板 (概要) */
        #info-panel {
            padding: 20px 40px 20px 60px;
            background: #fffaf8;
            border-bottom: 1px solid #eee;
            position: relative;
            display: none;
        }

        .close-panel-btn {
            position: absolute;
            right: 20px;
            top: 15px;
            cursor: pointer;
            padding: 4px 12px;
            font-size: 11px;
            color: #999;
            border: 1px solid #eee;
            border-radius: 20px;
            background: #fff;
        }

        .summary-content {
            color: #666;
            line-height: 1.6;
            font-size: 14px;
            border-left: 3px solid var(--accent);
            padding-left: 15px;
            margin-top: 10px;
            white-space: pre-wrap;
        }

        /* --- 渲染区域 --- */
        #render-container {
            flex: 1;
            background: #fff;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        /* EPUB 下载卡片样式 */
        #download-card {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
            padding: 40px;
        }

        .download-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        .download-btn {
            display: inline-block;
            padding: 12px 30px;
            background: var(--accent);
            color: #fff;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
            transition: 0.2s;
        }

        .download-btn:hover {
            background: #d44f00;
            transform: translateY(-2px);
        }

        .download-tip {
            margin-top: 15px;
            color: #999;
            font-size: 12px;
        }

        #floating-action-trigger {
            position: absolute;
            right: 25px;
            bottom: 25px;
            z-index: 90;
            cursor: pointer;
            background: #fff;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: none;
            align-items: center;
            justify-content: center;
            border: 1px solid #ddd;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
            font-size: 20px;
        }

        iframe {
            flex: 1;
            width: 100%;
            border: none;
            background: #525659;
        }

        .empty-placeholder {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #999;
            font-style: italic;
            text-align: center;
        }
    </style>
</head>

<body>

    <div id="sidebar">
        <div id="module-container">
            <div class="module-label">Assets / 书籍</div>
            <div id="book-tree">正在同步索引...</div>
        </div>
        <div class="sidebar-footer">
            <span style="margin-left: 35px;">文双的博客</span>
        </div>
    </div>

    <button id="toggle-btn" onclick="toggleSidebar()" data-tooltip="收起菜单">
        <svg width="16" height="16" viewBox="0 0 20 20" fill="currentColor">
            <path
                d="M12.452 4.516a.75.75 0 010 1.06l-4.44 4.424 4.44 4.424a.75.75 0 11-1.06 1.06l-4.97-4.954a.75.75 0 010-1.06l4.97-4.954a.75.75 0 011.06 0z" />
        </svg>
    </button>

    <div id="main-viewport">
        <div id="info-panel">
            <div class="close-panel-btn" onclick="setPanelVisible(false)">关闭摘要</div>
            <h2 id="item-title" style="margin:0; font-size: 1.1rem; color: #000;"></h2>
            <div class="summary-content" id="item-summary"></div>
        </div>

        <div id="render-container">
            <div id="floating-action-trigger" onclick="setPanelVisible(true)" data-tooltip="查看详情">💡</div>

            <div class="empty-placeholder" id="welcome-msg">点按左下角图标<br>开启深度阅读与思考</div>

            <!-- PDF 阅读器 -->
            <iframe id="pdf-viewer" style="display:none"></iframe>

            <!-- EPUB 下载界面 -->
            <div id="download-card">
                <div class="download-icon">📖</div>
                <h3 id="download-title"></h3>
                <p style="color: #666; margin-bottom: 30px;">该书籍为 EPUB 格式，建议下载后使用本地阅读器打开</p>
                <a href="#" id="actual-download-link" class="download-btn" download>立即下载书籍</a>
                <div class="download-tip">Tip: 手机用户推荐使用“微信读书”或“iBooks”打开</div>
            </div>
        </div>
    </div>

    <script>
        function toggleSidebar() {
            const isCollapsed = document.body.classList.toggle('collapsed');
            document.getElementById('toggle-btn').setAttribute('data-tooltip', isCollapsed ? '展开菜单' : '收起菜单');
        }

        function setPanelVisible(visible) {
            const panel = document.getElementById('info-panel');
            const trigger = document.getElementById('floating-action-trigger');
            if (visible) {
                panel.style.display = 'block';
                trigger.style.display = 'none';
            } else {
                panel.style.display = 'none';
                // 只有当已经选了东西，才显示灯泡
                if (document.getElementById('welcome-msg').style.display === 'none') {
                    trigger.style.display = 'flex';
                }
            }
        }

        fetch('./books_data.json')
            .then(res => res.json())
            .then(data => {
                const treeRoot = document.getElementById('book-tree');
                treeRoot.innerHTML = '';
                for (let category in data) {
                    const catEl = document.createElement('div');
                    catEl.className = 'tree-category';
                    catEl.textContent = category;
                    const listEl = document.createElement('ul');
                    listEl.className = 'tree-list';
                    data[category].forEach(item => {
                        const li = document.createElement('li');
                        li.className = 'tree-item';
                        li.textContent = item.title;
                        li.onclick = (e) => {
                            e.stopPropagation();
                            renderItem(category, item);
                            if (!document.body.classList.contains('collapsed')) toggleSidebar();
                        };
                        listEl.appendChild(li);
                    });
                    catEl.onclick = () => { catEl.classList.toggle('open'); listEl.classList.toggle('open'); };
                    treeRoot.appendChild(catEl);
                    treeRoot.appendChild(listEl);
                }
            });

        function renderItem(category, item) {
            document.getElementById('welcome-msg').style.display = 'none';
            document.getElementById('item-title').textContent = item.title;
            document.getElementById('item-summary').textContent = item.summary;
            setPanelVisible(true);

            const pdfViewer = document.getElementById('pdf-viewer');
            const downloadCard = document.getElementById('download-card');
            const bookUrl = `./books/${encodeURIComponent(category)}/${encodeURIComponent(item.fileName)}`;

            if (item.fileName.toLowerCase().endsWith('.epub')) {
                // 处理 EPUB：隐藏阅读器，显示下载卡片
                pdfViewer.style.display = 'none';
                downloadCard.style.display = 'flex';
                document.getElementById('download-title').textContent = item.title;
                document.getElementById('actual-download-link').href = bookUrl;
            } else {
                // 处理 PDF：显示阅读器，隐藏下载卡片
                downloadCard.style.display = 'none';
                pdfViewer.style.display = 'block';
                pdfViewer.src = bookUrl;
            }
        }
    </script>
</body>

</html>
